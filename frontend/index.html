<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deploy Test App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #222; }
    header { background: #2563eb; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.25rem; }
    #status { font-size: 0.8rem; padding: 0.25rem 0.6rem; border-radius: 999px; background: #1e40af; }
    #status.ok { background: #16a34a; }
    #status.err { background: #dc2626; }
    main { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { margin-bottom: 1rem; font-size: 1rem; color: #555; text-transform: uppercase; letter-spacing: .05em; }
    form { display: flex; gap: 0.5rem; }
    input[type=text] { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.95rem; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
    .btn-add { background: #2563eb; color: #fff; }
    .btn-add:hover { background: #1d4ed8; }
    ul { list-style: none; }
    li { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid #f3f4f6; }
    li:last-child { border-bottom: none; }
    li span { flex: 1; font-size: 0.95rem; }
    li span.done { text-decoration: line-through; color: #9ca3af; }
    .btn-toggle { background: #e5e7eb; color: #374151; font-size: 0.8rem; padding: 0.25rem 0.5rem; }
    .btn-toggle:hover { background: #d1fae5; }
    .btn-del { background: #fee2e2; color: #dc2626; font-size: 0.8rem; padding: 0.25rem 0.5rem; }
    .btn-del:hover { background: #fca5a5; }
    #error { color: #dc2626; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>Deploy Test App</h1>
    <span id="status">checking...</span>
  </header>
  <main>
    <div class="card">
      <h2>Add Item</h2>
      <form id="add-form">
        <input type="text" id="item-input" placeholder="New item name..." required />
        <button type="submit" class="btn-add">Add</button>
      </form>
      <div id="error"></div>
    </div>
    <div class="card">
      <h2>Items</h2>
      <ul id="item-list"><li>Loading...</li></ul>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
